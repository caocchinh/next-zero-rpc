<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypeScript Diagnostics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: #334155;
      --success-color: #10b981;
      --success-bg: rgba(16, 185, 129, 0.1);
      --error-color: #ef4444;
      --error-bg: rgba(239, 68, 68, 0.1);
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', 'Consolas', monospace;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: var(--font-sans);
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 2rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .container {
      width: 100%;
      max-width: 1200px;
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--border-color);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(30, 41, 59, 0.5);
    }
    
    .header-left {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    
    .header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .status-badge {
      padding: 0.375rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .status-success {
      background: var(--success-bg);
      color: var(--success-color);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    
    .status-error {
      background: var(--error-bg);
      color: var(--error-color);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    
    .header p {
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    
    .content {
      padding: 2rem;
      flex: 1;
    }
    
    .output-container {
      background: #0f172a;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      overflow: hidden;
    }

    .output-header {
      background: #1e293b;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      gap: 0.5rem;
    }

    .mac-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .mac-close { background: #ff5f56; }
    .mac-min { background: #ffbd2e; }
    .mac-max { background: #27c93f; }
    
    .output {
      padding: 1.5rem;
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: 0.875rem;
      line-height: 1.6;
      color: #e2e8f0;
    }
    
    .success-message {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
      gap: 1rem;
    }
    
    .success-icon {
      width: 64px;
      height: 64px;
      color: var(--success-color);
      background: var(--success-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.5rem;
    }
    
    .success-text {
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--text-main);
    }
    
    .timestamp {
      padding: 1rem 2rem;
      border-top: 1px solid var(--border-color);
      background: rgba(30, 41, 59, 0.5);
      color: var(--text-muted);
      font-size: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .timestamp code {
      background: var(--border-color);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-family: var(--font-mono);
      color: var(--text-main);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <h1>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #3178c6"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
          TypeScript Diagnostics
        </h1>
        <p>Project type checking results</p>
      </div>
      <div class="status-badge status-success">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> Passed
      </div>
    </div>
    <div class="content">
      
        <div class="success-message">
          <div class="success-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
          </div>
          <div class="success-text">No type errors found!</div>
          <p style="color: var(--text-muted); font-size: 0.875rem;">Your codebase is fully typed and ready to go.</p>
        </div>
      
    </div>
    <div class="timestamp">
      <span>Command: <code>tsc --noEmit</code></span>
      <span>Generated at: 6/24/2026, 10:00:04 PM</span>
    </div>
  </div>
</body>
</html>
