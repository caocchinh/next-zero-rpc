<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TypeScript Type Check Results</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f5f5f5;
        padding: 20px;
        line-height: 1.6;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }

      .header {
        background: #10b981;
        color: white;
        padding: 20px 30px;
        border-bottom: 3px solid #059669;
      }

      .header h1 {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .header p {
        opacity: 0.9;
        font-size: 14px;
      }

      .content {
        padding: 30px;
      }

      .output {
        background: #1e1e1e;
        color: #d4d4d4;
        padding: 20px;
        border-radius: 6px;
        overflow-x: auto;
        font-family: "Consolas", "Monaco", "Courier New", monospace;
        font-size: 13px;
        line-height: 1.5;
      }

      .success-message {
        color: #10b981;
        font-size: 18px;
        font-weight: 500;
        text-align: center;
        padding: 40px;
      }

      .timestamp {
        text-align: right;
        color: #666;
        font-size: 12px;
        margin-top: 20px;
        padding: 0 30px 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>TypeScript Type Check Results</h1>
        <p>All type checks passed successfully</p>
      </div>
      <div class="content">
        <div class="success-message">No TypeScript errors found! &#x2705;</div>
      </div>
      <div class="timestamp">Generated: 6/24/2026, 9:45:38 PM</div>
    </div>
  </body>
</html>
